<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise - Sneha Cutuu 💗</title>

<style>
:root {
    --cake-white: #FFFDD0;
    --cake-blue: #87CEEB;
    --cake-brown: #3D2B1F;
}

body {
    background: radial-gradient(circle, #ffafbd, #ffc3a0);
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
}

/* Wall Hanging */
.bunting-banner {
    position: absolute;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-evenly;
    z-index: 100;
}

.pennant {
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 45px solid #ff4d6d;
    transform-origin: top;
    animation: swing 3s infinite ease-in-out;
}
.p1 { border-top-color: #00b4d8; }
.p2 { border-top-color: #fca311; }
.p3 { border-top-color: #ffffff; }

@keyframes swing {
    0%,100% { transform: rotate(-6deg); }
    50% { transform: rotate(6deg); }
}

/* Main Wrapper */
.main-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
    z-index: 10;
}

.cake-assembly {
    position: relative;
    width: 180px;
    height: 120px;
}

.cake-layer {
    position: absolute;
    width: 100%;
    height: 38px;
    border-radius: 10px;
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(-500px);
    animation: dropLayer 0.8s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}

.layer-bottom { background: var(--cake-brown); bottom: 0; animation-delay: 0.5s; }
.layer-middle { background: var(--cake-blue); bottom: 38px; animation-delay: 1.3s; }
.layer-top { background: var(--cake-white); bottom: 76px; animation-delay: 2.1s; }

@keyframes dropLayer { to { opacity: 1; transform: translateY(0); } }

.candle {
    position: absolute;
    width: 10px; height: 42px;
    background: #fff;
    bottom: 114px; left: 50%;
    transform: translateX(-50%) scale(0);
    animation: grow 0.5s ease forwards 2.8s;
}

.flame {
    position: absolute;
    top: -16px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 20px;
    background: orange;
    border-radius: 50%;
    box-shadow: 0 0 15px orange;
    animation: flicker 0.6s infinite alternate;
}

@keyframes grow { to { transform: translateX(-50%) scale(1); } }
@keyframes flicker { from { opacity: 0.8; } to { opacity: 1; } }

.birthday-text {
    color: white;
    font-size: 2.5rem;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.3);
    white-space: nowrap;
    opacity: 0;
    animation: fadeIn 1s ease forwards 3.2s;
}

@keyframes fadeIn { to { opacity: 1; } }

/* Animation Layers */
#balloons-layer, #fireworks-layer, #hearts-layer {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.balloon-box {
    position: absolute;
    bottom: -150px;
    animation: floatUp 8s linear forwards;
}
.balloon {
    width: 50px; height: 65px;
    border-radius: 50%;
}
.thread {
    width: 1.5px; height: 75px;
    background: rgba(255,255,255,0.4);
    position: absolute;
    bottom: -72px; left: 50%;
}

@keyframes floatUp { to { transform: translateY(-130vh); } }

.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: fallRain 4s linear forwards;
}

@keyframes fallRain {
    to { transform: translateY(110vh) rotate(360deg); }
}

.rocket {
    position: absolute;
    width: 6px; height: 25px;
    background: linear-gradient(to top,#fff,#ffeb3b);
    box-shadow: 0 0 20px #fff, 0 0 30px #ffeb3b;
}

.particle {
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
}
</style>
</head>

<body>

<div class="bunting-banner">
    <div class="pennant p1"></div><div class="pennant p2"></div>
    <div class="pennant p3"></div><div class="pennant p1"></div>
    <div class="pennant p2"></div><div class="pennant p3"></div>
</div>

<div id="balloons-layer"></div>
<div id="fireworks-layer"></div>
<div id="hearts-layer"></div>

<div class="main-wrapper">
    <div class="cake-assembly">
        <div class="cake-layer layer-bottom"></div>
        <div class="cake-layer layer-middle"></div>
        <div class="cake-layer layer-top"></div>
        <div class="candle"><div class="flame"></div></div>
    </div>

    <h1 class="birthday-text">Happiest Birthday Sneha Cutuu 💗</h1>
</div>

<script>
function init() {
    const bZone = document.getElementById('balloons-layer');
    const hZone = document.getElementById('hearts-layer');
    const rZone = document.getElementById('fireworks-layer');

    const bInt = setInterval(() => {
        const wrap = document.createElement('div');
        wrap.className = 'balloon-box';
        wrap.style.left = Math.random() * 95 + 'vw';

        const b = document.createElement('div');
        b.className = 'balloon';
        b.style.background =
            ['#ff4d6d','#00b4d8','#fca311','#9d4edd'][Math.floor(Math.random()*4)];

        const t = document.createElement('div');
        t.className = 'thread';

        wrap.appendChild(b);
        wrap.appendChild(t);
        bZone.appendChild(wrap);

        setTimeout(() => wrap.remove(), 9000);
    }, 600);

    setTimeout(() => clearInterval(bInt), 30000);

    setInterval(() => {
        const h = document.createElement('div');
        h.className = 'heart';
        h.innerHTML = '💗';
        h.style.left = Math.random() * 100 + 'vw';
        h.style.top = '-30px';
        hZone.appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }, 350);

    setInterval(() => {
        const r = document.createElement('div');
        r.className = 'rocket';
        r.style.left = Math.random() * 100 + 'vw';
        r.style.bottom = '0';
        rZone.appendChild(r);

        r.animate(
            [{ transform: 'translateY(0)' },
             { transform: 'translateY(-75vh)' }],
            { duration: 1100, easing: 'ease-in' }
        );

        setTimeout(() => {
            createBurst(r.style.left);
            r.remove();
        }, 1050);
    }, 750);
}

function createBurst(left) {
    for (let i = 0; i < 35; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = left;
        p.style.top = '25vh';

        const size = Math.random() * 6 + 4;
        p.style.width = size + 'px';
        p.style.height = size + 'px';

        const colors =
            ['#ffffff','#ffeb3b','#00e5ff','#ff4081','#7fff00','#87CEEB'];
        const c = colors[Math.floor(Math.random()*colors.length)];
        p.style.backgroundColor = c;
        p.style.color = c;

        document.body.appendChild(p);

        const a = Math.random() * Math.PI * 2;
        const v = Math.random() * 180 + 60;

        p.animate(
            [
                { transform:'translate(0,0)', opacity:1 },
                { transform:`translate(${Math.cos(a)*v}px, ${Math.sin(a)*v}px)`,
                  opacity:0 }
            ],
            { duration:1100, fill:'forwards' }
        );

        setTimeout(() => p.remove(), 1100);
    }
}

window.onload = init;
</script>

</body>
</html>
